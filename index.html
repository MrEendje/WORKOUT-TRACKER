<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Workout Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * { font-family: 'Inter', -apple-system, sans-serif; }
      input, select, textarea { font-size: 16px !important; }

      .calendar-day { min-height: 48px; touch-action: manipulation; }
      .color-swatch { width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,box-shadow .15s; }
      .color-swatch.selected { border-color:#fff;transform:scale(1.15);box-shadow:0 0 0 2.5px #1e293b; }
      .modal-scroll::-webkit-scrollbar { display:none; }
      .modal-scroll { -ms-overflow-style:none;scrollbar-width:none; }
      .touch-btn { min-height:44px;min-width:44px; }
      .search-clear { display:none; }
      .search-clear.visible { display:flex; }

      @keyframes pulse-glow { 0%,100%{box-shadow:0 0 0 0 rgba(14,165,233,.45)} 50%{box-shadow:0 0 0 12px rgba(14,165,233,0)} }
      .start-pulse { animation: pulse-glow 2s infinite; }
      @keyframes slide-up { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
      .slide-up { animation: slide-up .25s cubic-bezier(.16,1,.3,1); }
      @keyframes pop-in { from{transform:scale(.75);opacity:0} to{transform:scale(1);opacity:1} }
      .pr-pop { animation: pop-in .35s cubic-bezier(.34,1.56,.64,1); }
      @keyframes fade-in { from{opacity:0} to{opacity:1} }
      .fade-in { animation: fade-in .2s ease; }

      .nav-item { position:relative; transition:color .15s; }
      .nav-dot { position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#0ea5e9;opacity:0;transition:opacity .2s; }
      .nav-item.active .nav-dot { opacity:1; }
      .stat-accent { height:3px;border-radius:0 0 12px 12px; }

      /* Dark mode */
      html.dark body            { background:#0a0e1a !important; color:#e2e8f0; }
      html.dark .bg-white       { background:#131929 !important; }
      html.dark .bg-slate-50    { background:#0d1220 !important; }
      html.dark .bg-slate-100   { background:#192235 !important; }
      html.dark .bg-slate-200   { background:#223050 !important; }
      html.dark .border-slate-200  { border-color:#223050 !important; }
      html.dark .border-slate-100  { border-color:#192235 !important; }
      html.dark .text-slate-700    { color:#cbd5e1 !important; }
      html.dark .text-slate-600    { color:#94a3b8 !important; }
      html.dark .text-slate-500    { color:#64748b !important; }
      html.dark .text-slate-400    { color:#475569 !important; }
      html.dark .shadow-sm         { box-shadow:0 1px 4px rgba(0,0,0,.6); }
      html.dark header             { background:#0d1220 !important; border-color:#192235 !important; }
      html.dark nav                { background:#0d1220 !important; border-color:#192235 !important; }
      html.dark .calendar-day      { background:#131929 !important; }
      html.dark input, html.dark select, html.dark textarea { background:#192235 !important; border-color:#223050 !important; color:#e2e8f0 !important; }
      html.dark .bg-sky-50    { background:#0b1e35 !important; }
      html.dark .bg-amber-50  { background:#1d1000 !important; }
      html.dark .bg-red-50    { background:#1f0707 !important; }
      html.dark .text-sky-600    { color:#38bdf8 !important; }
      html.dark .text-sky-500    { color:#38bdf8 !important; }

      /* Login screen */
      #login-screen { position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center; }
      #login-screen.hidden { display:none; }

      /* Loading */
      #app-loading { position:fixed;inset:0;z-index:99;background:#0f172a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px; }
      #app-loading.hidden { display:none; }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen flex flex-col pb-20" id="app-body">

    <!-- Loading screen -->
    <div id="app-loading">
      <div class="w-16 h-16 bg-gradient-to-br from-sky-400 to-sky-600 rounded-2xl flex items-center justify-center shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <p class="text-slate-400 text-sm font-medium">Laden…</p>
    </div>

    <!-- Login screen -->
    <div id="login-screen" class="hidden">
      <div class="w-full max-w-sm px-6 fade-in">
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-gradient-to-br from-sky-400 to-sky-600 rounded-2xl flex items-center justify-center shadow-lg mx-auto mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <h1 class="text-2xl font-black text-white">Workout Tracker</h1>
          <p class="text-slate-400 text-sm mt-1">Log in om verder te gaan</p>
        </div>
        <div class="bg-white/10 backdrop-blur rounded-2xl p-6 space-y-4">
          <div>
            <label class="text-sm font-medium text-slate-300 block mb-1.5">E-mailadres</label>
            <input id="login-email" type="email" placeholder="naam@voorbeeld.nl"
              class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-slate-500 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-400/30 transition-all" />
          </div>
          <div>
            <label class="text-sm font-medium text-slate-300 block mb-1.5">Wachtwoord</label>
            <input id="login-password" type="password" placeholder="••••••••"
              class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-slate-500 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-400/30 transition-all" />
          </div>
          <p id="login-error" class="text-red-400 text-sm hidden"></p>
          <button id="login-btn"
            class="w-full py-3.5 bg-sky-500 hover:bg-sky-400 text-white font-bold rounded-xl transition-colors shadow-lg touch-btn">
            Inloggen
          </button>
        </div>
      </div>
    </div>

    <!-- Main App (hidden until auth) -->
    <div id="main-app" class="hidden flex flex-col min-h-screen">

      <!-- Header -->
      <header class="bg-white shadow-sm fixed top-0 left-0 right-0 z-20 border-b border-slate-100">
        <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
          <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 bg-gradient-to-br from-sky-400 to-sky-600 rounded-xl flex items-center justify-center shadow-sm">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
            <div>
              <h1 class="text-sm font-bold tracking-tight leading-none">Workout Tracker</h1>
              <p id="header-username" class="text-xs text-slate-400 leading-none mt-0.5"></p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button id="btn-dark-mode" class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 text-base touch-btn">🌙</button>
            <button id="btn-logout" class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 touch-btn" title="Uitloggen">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="pt-16 max-w-2xl mx-auto px-3 w-full flex-1">
        <div id="views">

          <!-- Dashboard -->
          <section id="view-dashboard" class="space-y-3 py-3">
            <div id="today-plan"></div>
            <div id="stats-row" class="grid grid-cols-3 gap-2"></div>
            <div id="calendar" class="bg-white rounded-2xl p-3 shadow-sm">
              <div class="flex items-center justify-between mb-3">
                <button id="prev-month" class="touch-btn w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 font-bold text-lg">‹</button>
                <div id="month-label" class="font-semibold text-sm text-slate-700"></div>
                <button id="next-month" class="touch-btn w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 text-slate-600 font-bold text-lg">›</button>
              </div>
              <div id="calendar-legend" class="flex flex-wrap gap-x-3 gap-y-1.5 mb-2.5 px-0.5"></div>
              <div class="grid grid-cols-7 gap-1 mb-1">
                <div class="text-xs text-slate-400 text-center font-semibold py-1">Ma</div>
                <div class="text-xs text-slate-400 text-center font-semibold py-1">Di</div>
                <div class="text-xs text-slate-400 text-center font-semibold py-1">Wo</div>
                <div class="text-xs text-slate-400 text-center font-semibold py-1">Do</div>
                <div class="text-xs text-slate-400 text-center font-semibold py-1">Vr</div>
                <div class="text-xs text-slate-400 text-center font-semibold py-1">Za</div>
                <div class="text-xs text-slate-400 text-center font-semibold py-1">Zo</div>
              </div>
              <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            </div>
            <div id="recent-workouts"></div>
          </section>

          <!-- Workout -->
          <section id="view-workout" class="hidden py-3 space-y-3"></section>

          <!-- Records -->
          <section id="view-prs" class="hidden py-3">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-8 h-8 bg-amber-100 rounded-xl flex items-center justify-center">🏆</div>
              <h2 class="text-lg font-bold">Persoonlijke Records</h2>
            </div>
            <div id="prs-list" class="grid gap-2.5"></div>
          </section>

          <!-- Catalog -->
          <section id="view-catalog" class="hidden space-y-3 py-3">
            <div class="relative flex items-center bg-white rounded-xl shadow-sm px-3 border border-slate-100">
              <svg class="w-4 h-4 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 19A8 8 0 1 1 11 3a8 8 0 0 1 0 16z"/>
              </svg>
              <input id="catalog-search" type="search" placeholder="Zoek oefeningen…" class="flex-1 py-3 px-2.5 bg-transparent outline-none text-sm" />
              <button id="catalog-search-clear" class="search-clear items-center justify-center w-6 h-6 text-slate-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div id="catalog-trainer-controls" class="hidden">
              <div class="flex items-center justify-between">
                <h2 class="text-base font-bold text-slate-800">Oefeningen</h2>
                <div class="flex gap-2">
                  <button id="btn-new-category" class="touch-btn bg-slate-100 text-slate-600 px-3 py-2 rounded-xl text-sm font-medium">📁 Categorie</button>
                  <button id="btn-new-exercise" class="touch-btn bg-sky-500 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm">+ Nieuw</button>
                </div>
              </div>
            </div>
            <div id="catalog-client-header" class="hidden">
              <h2 class="text-base font-bold text-slate-800">Oefeningen</h2>
            </div>
            <div id="catalog-list" class="grid gap-2"></div>
            <div id="routines-section" class="mt-1">
              <div class="flex items-center justify-between mb-2">
                <h3 class="text-base font-bold text-slate-800">Routines</h3>
                <button id="btn-new-routine" class="hidden touch-btn bg-slate-800 text-white px-4 py-2 rounded-xl text-sm font-semibold">+ Nieuw</button>
              </div>
              <div id="routines-list" class="grid gap-2"></div>
            </div>
          </section>

          <!-- Progression (client only) -->
          <section id="view-progression" class="hidden py-3 space-y-3">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 bg-green-100 rounded-xl flex items-center justify-center text-base">📈</div>
              <h2 class="text-lg font-bold">Mijn Progressie</h2>
            </div>
            <div id="progression-content" class="space-y-4"></div>
          </section>

          <!-- Clients (trainer only) -->
          <section id="view-clients" class="hidden py-3 space-y-3">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-sky-100 rounded-xl flex items-center justify-center">👥</div>
                <h2 class="text-lg font-bold">Klanten</h2>
              </div>
              <button id="btn-new-client" class="touch-btn bg-sky-500 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-sm">+ Nieuw</button>
            </div>
            <div id="clients-list" class="grid gap-3"></div>
          </section>

        </div>
      </main>

      <!-- Bottom Navigation -->
      <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 z-20">
        <div id="nav-bar" class="max-w-2xl mx-auto grid grid-cols-3">
          <button data-view="view-dashboard" class="nav-item active flex flex-col items-center justify-center pt-3 pb-5 gap-1">
            <svg class="nav-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9.75L12 3l9 6.75V21a1 1 0 01-1 1H5a1 1 0 01-1-1V9.75z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 22V12h6v10"/>
            </svg>
            <span class="nav-label text-xs font-semibold">Home</span>
            <div class="nav-dot"></div>
          </button>
          <button data-view="view-prs" class="nav-item flex flex-col items-center justify-center pt-3 pb-5 gap-1">
            <svg class="nav-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
            </svg>
            <span class="nav-label text-xs font-semibold">Records</span>
            <div class="nav-dot"></div>
          </button>
          <button data-view="view-catalog" class="nav-item flex flex-col items-center justify-center pt-3 pb-5 gap-1">
            <svg class="nav-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h10"/>
            </svg>
            <span class="nav-label text-xs font-semibold">Catalogus</span>
            <div class="nav-dot"></div>
          </button>
        </div>
      </nav>

    </div><!-- /main-app -->

    <div id="modal-root"></div>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
